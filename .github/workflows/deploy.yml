name: Deploy to VM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'DEPLOY_STATUS.md'   # prevents the status-update commit from re-triggering deploy

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/aggasys-bot
          git pull --rebase origin main

      - name: Sync deployment secrets into VM env
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ALLOWED_USERS: ${{ secrets.ALLOWED_USERS }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          cd ~/aggasys-bot
          touch .env
          upsert_env() {
            local key="$1"
            local value="$2"
            if grep -q "^${key}=" .env; then
              python3 -c 'import sys; from pathlib import Path; key,value=sys.argv[1],sys.argv[2]; path=Path(".env"); lines=path.read_text(encoding="utf-8").splitlines(); path.write_text("\n".join((f"{key}={value}" if line.startswith(f"{key}=") else line) for line in lines) + "\n", encoding="utf-8")' "$key" "$value"
            else
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }
          if [ -n "${DEEPSEEK_API_KEY:-}" ]; then
            upsert_env MODEL_PROVIDER deepseek
            upsert_env DEEPSEEK_API_KEY "$DEEPSEEK_API_KEY"
            upsert_env DEEPSEEK_BASE_URL https://api.deepseek.com
            upsert_env DEEPSEEK_MODEL deepseek-v4-flash
            upsert_env EMBEDDING_PROVIDER disabled
          else
            echo "DEEPSEEK_API_KEY GitHub secret is not set; using existing VM .env."
          fi
          if [ -n "${ALLOWED_USERS:-}" ]; then
            upsert_env ALLOWED_USERS "$ALLOWED_USERS"
          fi
          if [ -n "${DB_PASS:-}" ]; then
            upsert_env DB_PASS "$DB_PASS"
            DATABASE_URL="$(python3 -c 'import sys, urllib.parse; print("postgresql://aggasys:" + urllib.parse.quote(sys.argv[1], safe="") + "@postgres:5432/aggasys")' "$DB_PASS")"
            upsert_env DATABASE_URL "$DATABASE_URL"
          fi
          upsert_env HERMES_TIMEZONE Asia/Singapore
          upsert_env HERMES_GROUP_CHAT_MODE mention
          upsert_env GRAY_BOT_USERNAME GrayBot

      - name: Run Gray/Hermes verification gates
        run: |
          cd ~/aggasys-bot
          bash scripts/check_vps_prereqs.sh --skip-models
          python3 bot/preflight.py --env-file .env
          python3 -m pip install --user -r bot/requirements.txt
          ALLOW_WORKSPACE_ENV=1 python3 scripts/run_checks.py
          docker compose config >/dev/null

      - name: Run database migration (idempotent)
        run: |
          cd ~/aggasys-bot
          docker compose up -d postgres
          for attempt in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U aggasys -d aggasys >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Postgres did not become ready in time."
              exit 1
            fi
            sleep 2
          done
          bash scripts/backup_hermes_data.sh backups
          docker compose exec -T postgres psql -v ON_ERROR_STOP=1 -U aggasys -d aggasys < migration.sql

      - name: Pull required Ollama models
        run: |
          cd ~/aggasys-bot
          MODEL_PROVIDER="$(grep '^MODEL_PROVIDER=' .env | cut -d= -f2 | tr -d ' ' || true)"
          EMBEDDING_PROVIDER="$(grep '^EMBEDDING_PROVIDER=' .env | cut -d= -f2 | tr -d ' ' || true)"
          MODEL_PROVIDER="${MODEL_PROVIDER:-deepseek}"
          EMBEDDING_PROVIDER="${EMBEDDING_PROVIDER:-disabled}"
          if [ "$MODEL_PROVIDER" = "ollama" ] || [ "$EMBEDDING_PROVIDER" = "ollama" ]; then
            OLLAMA_MODEL="$(grep '^OLLAMA_MODEL=' .env | cut -d= -f2 | tr -d ' ' || true)"
            EMBED_MODEL="$(grep '^EMBED_MODEL=' .env | cut -d= -f2 | tr -d ' ' || true)"
            ollama pull "${OLLAMA_MODEL:-qwen2.5:3b}" || true
            if [ "$EMBEDDING_PROVIDER" = "ollama" ]; then
              ollama pull "${EMBED_MODEL:-nomic-embed-text}" || true
            fi
          else
            echo "Skipping Ollama model pull for MODEL_PROVIDER=$MODEL_PROVIDER EMBEDDING_PROVIDER=$EMBEDDING_PROVIDER"
          fi
          bash scripts/check_vps_prereqs.sh

      - name: Rebuild and restart bot
        run: |
          cd ~/aggasys-bot
          docker compose up -d --build bot

      - name: Health check and publish VM status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd ~/aggasys-bot
          sleep 12
          bash scripts/check_post_deploy_health.sh

          # Collect live VM state — redact credentials
          {
            echo "# VM Deploy Status"
            echo ""
            echo "**Deployed:** $(date)"
            echo "**Commit:** $GITHUB_SHA"
            echo ""
            echo "## Docker Services"
            echo '```'
            docker compose ps
            echo '```'
            echo ""
            echo "## Bot Logs (last 30 lines)"
            echo '```'
            docker compose logs bot --tail=30 2>&1 \
              | sed 's/\(TOKEN\|PASSWORD\|PASS\|SECRET\)[=:][^ ]*/\1=***/gi'
            echo '```'
            echo ""
            echo "## Model Backend"
            echo '```'
            MODEL_PROVIDER="$(grep '^MODEL_PROVIDER=' .env | cut -d= -f2 | tr -d ' ' || true)"
            EMBEDDING_PROVIDER="$(grep '^EMBEDDING_PROVIDER=' .env | cut -d= -f2 | tr -d ' ' || true)"
            echo "MODEL_PROVIDER=${MODEL_PROVIDER:-deepseek}"
            echo "EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-disabled}"
            if command -v ollama >/dev/null 2>&1; then
              ollama list 2>&1
            else
              echo "Ollama not installed; not required for DeepSeek API mode."
            fi
            echo '```'
            echo ""
            echo "## .env Keys Present (no values)"
            echo '```'
            grep -oE '^[A-Z_]+' ~/aggasys-bot/.env 2>/dev/null | sort
            echo '```'
            echo ""
            echo "## Gray/Hermes Verification Gates"
            echo '```'
            ALLOW_WORKSPACE_ENV=1 python3 scripts/run_checks.py 2>&1
            echo '```'
            echo ""
            echo "## Gray/Hermes Preflight"
            echo '```'
            python3 bot/preflight.py --env-file .env 2>&1
            echo '```'
            echo ""
            echo "## Post-Deploy Health"
            echo '```'
            bash scripts/check_post_deploy_health.sh 2>&1
            echo '```'
          } > DEPLOY_STATUS.md

          # Commit status back to main — paths-ignore above prevents re-trigger
          git config user.email "runner@aggasys-ai"
          git config user.name "VM Runner"
          git add -f DEPLOY_STATUS.md
          git diff --staged --quiet || {
            git commit -m "Update deploy status [skip ci]"
            git pull --rebase origin main || true
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          }
