name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted  # runs on your VM runner

    steps:
      - name: Pull latest code
        run: |
          cd ~/aggasys-bot
          git pull origin main

      - name: Rebuild and restart bot
        run: |
          cd ~/aggasys-bot
          docker compose up -d --build bot

      - name: Health check
        run: |
          sleep 5
          docker compose -f ~/aggasys-bot/docker-compose.yml ps bot
          docker compose -f ~/aggasys-bot/docker-compose.yml logs bot --tail=20
