services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: aggasys
      POSTGRES_USER: aggasys
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  bot:
    build: ./bot
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    network_mode: host  # needs host to reach Ollama on localhost:11434
    volumes:
      - whisper_cache:/root/.cache/huggingface  # persist whisper model downloads

volumes:
  postgres_data:
  whisper_cache:
